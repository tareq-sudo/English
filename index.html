<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadEnglish - تعلم الإنجليزية</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--card2:#222;--blue:#4A90E2;--gold:#f5a623;--text:#f0f0f0;--muted:#888;--border:#333;--green:#4CAF50;--red:#f44336}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh;padding-bottom:80px}
.page.active{display:block}
.topbar{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--border)}
.topbar-title{font-size:1.3rem;font-weight:800}
.icon-btn{background:var(--card2);border:none;color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.level-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.level-tabs::-webkit-scrollbar{display:none}
.ltab{padding:6px 18px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;white-space:nowrap;transition:all .2s;font-weight:600}
.ltab.active{background:var(--blue);color:white;border-color:var(--blue)}
.section{padding:0 16px 16px}
.section-title{font-size:1rem;font-weight:700;margin-bottom:12px}
.cat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{padding:8px 16px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:.82rem;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .2s}
.cat-chip.active{background:var(--blue);border-color:var(--blue)}
.books-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.books-scroll::-webkit-scrollbar{display:none}
.book-card{flex-shrink:0;width:130px;cursor:pointer;transition:transform .2s}
.book-card:hover{transform:translateY(-3px)}
.book-cover{width:130px;height:180px;border-radius:12px;position:relative;overflow:hidden;margin-bottom:8px;box-shadow:0 8px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.book-emoji{font-size:4rem}
.book-title-cover{font-size:.6rem;color:white;text-align:center;padding:0 6px;font-weight:700;direction:ltr;line-height:1.3}
.book-level-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:700}
.badge-a1{background:rgba(76,175,80,.95);color:white}
.badge-a2{background:rgba(74,144,226,.95);color:white}
.badge-b1{background:rgba(255,152,0,.95);color:white}
.badge-b2{background:rgba(244,67,54,.95);color:white}
.book-name{font-size:.78rem;font-weight:700;text-align:center;line-height:1.3;direction:ltr}
.book-author{font-size:.68rem;color:var(--muted);text-align:center;margin-top:2px}
.featured{padding:0 16px 16px}
.featured-card{border-radius:16px;overflow:hidden;position:relative;height:200px;cursor:pointer;display:flex;align-items:flex-end}
.featured-overlay{position:absolute;inset:0;background:linear-gradient(transparent 20%,rgba(0,0,0,.92))}
.featured-emoji{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:5rem}
.featured-info{position:relative;z-index:2;padding:16px;width:100%}
.featured-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;margin-bottom:6px}
.featured-title{font-size:1.05rem;font-weight:800;direction:ltr}
.featured-sub{font-size:.8rem;color:#ccc;margin-top:4px}
.reader-topbar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;gap:8px}
.reader-title{font-size:.85rem;font-weight:700;flex:1;text-align:center;direction:ltr;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.new-words-badge{background:var(--green);color:white;padding:3px 8px;border-radius:20px;font-size:.7rem;white-space:nowrap}
.chapter-content{padding:16px 16px 230px;line-height:2.4;font-size:1.05rem;direction:ltr;text-align:left}
.chapter-title{font-size:1.1rem;font-weight:800;margin-bottom:16px;direction:rtl;text-align:right}
.chapter-title span{color:var(--blue)}
.word{cursor:pointer;border-radius:3px;padding:0 1px;transition:background .1s;display:inline}
.word:hover{background:rgba(74,144,226,.25)}
.word.highlighted{background:rgba(245,166,35,.35);color:var(--gold)}
.word.new-word{color:var(--gold);border-bottom:1.5px dashed var(--gold)}
.sent-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--card2);border-radius:50%;cursor:pointer;font-size:.6rem;border:1px solid var(--border);vertical-align:middle;color:var(--muted);margin:0 3px}
.sent-btn:hover{background:var(--blue);color:white}
.audio-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 14px 14px;z-index:100}
.audio-tabs{display:flex;gap:0;margin-bottom:10px;background:var(--bg);border-radius:10px;padding:3px}
.audio-tab{flex:1;padding:7px;text-align:center;border-radius:8px;cursor:pointer;font-size:.82rem;color:var(--muted);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.audio-tab.active{background:var(--card2);color:var(--text);font-weight:700}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:4px;cursor:pointer;position:relative;margin-bottom:6px}
.progress-fill{height:100%;background:var(--blue);border-radius:4px}
.progress-dot{position:absolute;top:50%;transform:translateY(-50%);width:13px;height:13px;background:var(--blue);border-radius:50%;margin-left:-6px;box-shadow:0 2px 6px rgba(74,144,226,.5)}
.time-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.time-txt{font-size:.72rem;color:var(--muted)}
.speed-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:4px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;font-weight:700;transition:all .2s}
.speed-btn:active{transform:scale(.95)}
.controls{display:flex;align-items:center;justify-content:center;gap:20px}
.skip-btn{background:var(--card2);border:none;color:var(--text);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;flex-direction:column;align-items:center;justify-content:center}
.skip-lbl{font-size:.5rem;color:var(--muted)}
.play-main{width:56px;height:56px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(74,144,226,.4);transition:transform .1s}
.play-main:active{transform:scale(.93)}
.trans-popup{position:fixed;z-index:300;background:#1a1a2e;border:1.5px solid var(--blue);border-radius:14px;padding:14px;max-width:185px;box-shadow:0 8px 28px rgba(0,0,0,.8);display:none}
.trans-popup.show{display:block}
.trans-word{font-size:1.1rem;font-weight:700;color:var(--blue);direction:ltr}
.trans-arabic{font-size:.95rem;color:var(--text);margin:6px 0}
.trans-speak{background:var(--blue);border:none;color:white;padding:6px 10px;border-radius:8px;font-size:.78rem;cursor:pointer;width:100%;font-weight:600}
.quiz-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:400;align-items:center;justify-content:center;padding:20px}
.quiz-overlay.show{display:flex}
.quiz-card{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:400px;border:1px solid var(--border)}
.quiz-progress{font-size:.78rem;color:var(--muted);margin-bottom:4px;text-align:center}
.quiz-q{font-size:1rem;font-weight:700;text-align:center;margin-bottom:20px;direction:ltr;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;font-size:.9rem;direction:ltr;transition:all .2s}
.quiz-opt:hover{border-color:var(--blue)}
.quiz-opt.correct{background:rgba(76,175,80,.2);border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:rgba(244,67,54,.2);border-color:var(--red);color:var(--red)}
.quiz-score{font-size:2.8rem;font-weight:900;color:var(--gold);text-align:center}
.quiz-btn{background:var(--blue);color:white;border:none;padding:12px 28px;border-radius:12px;font-size:.95rem;cursor:pointer;margin-top:16px;width:100%;font-weight:700}
.vocab-list{padding:12px}
.vocab-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.vocab-en{font-size:.95rem;font-weight:700;direction:ltr}
.vocab-ar{font-size:.82rem;color:var(--muted)}
.speak-word-btn{background:var(--card2);border:1px solid var(--border);color:var(--blue);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.progress-page{padding:16px}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.prog-title{font-size:.92rem;font-weight:700;margin-bottom:10px}
.prog-bar-wrap{background:var(--card2);border-radius:8px;height:9px;overflow:hidden;margin-bottom:6px}
.prog-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--blue),#66b3ff);transition:width .5s}
.prog-info{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted)}
.streak-num{font-size:2.8rem;font-weight:900;color:var(--gold);text-align:center}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:60;padding:8px 0 12px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px}
.nav-icon{font-size:1.25rem}
.nav-label{font-size:.63rem;color:var(--muted)}
.nav-item.active .nav-label{color:var(--blue)}
</style>
</head>
<body>

<div class="trans-popup" id="transPopup">
  <div class="trans-word" id="tWord"></div>
  <div class="trans-arabic" id="tArabic"></div>
  <button class="trans-speak" onclick="speakWord(document.getElementById('tWord').textContent)">🔊 استمع</button>
</div>

<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-card" id="quizCard"></div>
</div>

<!-- LIBRARY -->
<div class="page active" id="libPage">
  <div class="topbar"><div class="topbar-title">المكتبة 📚</div></div>
  <div class="level-tabs">
    <button class="ltab active" onclick="filterLevel('all',this)">الكل</button>
    <button class="ltab" onclick="filterLevel('A1',this)">🟢 A1</button>
    <button class="ltab" onclick="filterLevel('A2',this)">🔵 A2</button>
    <button class="ltab" onclick="filterLevel('B1',this)">🟠 B1</button>
    <button class="ltab" onclick="filterLevel('B2',this)">🔴 B2</button>
  </div>
  <div class="section">
    <div class="cat-scroll">
      <div class="cat-chip active" onclick="filterCat('all',this)">⭐ الكل</div>
      <div class="cat-chip" onclick="filterCat('fantasy',this)">✨ فانتازي</div>
      <div class="cat-chip" onclick="filterCat('mystery',this)">🔍 غموض</div>
      <div class="cat-chip" onclick="filterCat('classic',this)">📖 كلاسيكي</div>
      <div class="cat-chip" onclick="filterCat('adventure',this)">🗺️ مغامرة</div>
    </div>
  </div>
  <div class="featured" id="featuredDiv"></div>
  <div class="section"><div class="section-title">✨ فانتازي وخيال</div><div class="books-scroll" id="fantasyGrid"></div></div>
  <div class="section"><div class="section-title">🔍 غموض وإثارة</div><div class="books-scroll" id="mysteryGrid"></div></div>
  <div class="section"><div class="section-title">🗺️ مغامرة وكلاسيكي</div><div class="books-scroll" id="classicGrid"></div></div>
</div>

<!-- READER -->
<div class="page" id="readerPage">
  <div class="reader-topbar">
    <button class="icon-btn" onclick="closeReader()">✕</button>
    <div class="reader-title" id="readerTitle"></div>
    <div class="new-words-badge" id="newWordsBadge">✅ 0</div>
    <button class="icon-btn" onclick="showQuiz()" title="اختبار">🧪</button>
  </div>
  <div class="chapter-content" id="chapterContent"></div>
  <div class="audio-panel">
    <div class="audio-tabs">
      <div class="audio-tab active" id="listenTab" onclick="setMode('listen')">🎧 استماع</div>
      <div class="audio-tab" id="readTab" onclick="setMode('read')">📖 قراءة</div>
    </div>
    <div class="progress-bar" onclick="seekProgress(event)" id="progressBar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-dot" id="progressDot" style="left:0%"></div>
    </div>
    <div class="time-row">
      <span class="time-txt" id="timeNow">00:00</span>
      <button class="speed-btn" onclick="cycleSpeed()" id="speedBtn">1.0x</button>
      <span class="time-txt" id="timeTot">00:00</span>
    </div>
    <div class="controls">
      <button class="skip-btn" onclick="skipBack()">⏪<span class="skip-lbl">خلف</span></button>
      <button class="play-main" id="playMain" onclick="togglePlay()">▶</button>
      <button class="skip-btn" onclick="skipFwd()">⏩<span class="skip-lbl">أمام</span></button>
    </div>
  </div>
</div>

<!-- VOCAB -->
<div class="page" id="vocabPage">
  <div class="topbar"><div class="topbar-title">المفردات 📝</div></div>
  <div class="vocab-list" id="vocabList"></div>
</div>

<!-- PROGRESS -->
<div class="page" id="progressPage">
  <div class="topbar"><div class="topbar-title">النشاط 🏆</div></div>
  <div class="progress-page">
    <div class="prog-card" style="text-align:center">
      <div class="streak-num">🔥 1</div>
      <div style="color:var(--muted);font-size:.85rem">أيام متواصلة</div>
    </div>
    <div class="prog-card">
      <div class="prog-title">📝 المفردات المحفوظة</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="vocabProg" style="width:0%"></div></div>
      <div class="prog-info"><span id="vocabCountProg">0 كلمة</span><span>الهدف: 100</span></div>
    </div>
    <div class="prog-card">
      <div class="prog-title">🧪 نتائج الاختبارات</div>
      <div id="quizResults" style="color:var(--muted);font-size:.85rem;padding:8px 0">لم تجري اختبارات بعد</div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">
  <div class="nav-item" onclick="showMainPage('progressPage',this)"><div class="nav-icon">🏆</div><div class="nav-label">النشاط</div></div>
  <div class="nav-item active" onclick="showMainPage('libPage',this)"><div class="nav-icon">📚</div><div class="nav-label">المكتبة</div></div>
  <div class="nav-item" onclick="showMainPage('vocabPage',this)"><div class="nav-icon">📝</div><div class="nav-label">المفردات</div></div>
</div>

<script>
const books=[
  {id:0,title:"Harry Potter and the Philosopher's Stone",author:"J.K. Rowling",level:"A1",cat:"fantasy",color:"linear-gradient(135deg,#1a237e,#3949ab)",emoji:"⚡",
  quiz:[
    {q:"Where does Harry sleep at the Dursley house?",opts:["In a bedroom","Under the stairs","In the garden","In the attic"],ans:1},
    {q:"What is the name of Harry's owl?",opts:["Snowball","Hedwig","Luna","Pearl"],ans:1},
    {q:"What does Hagrid give Harry on his birthday?",opts:["A wand","A broomstick","A birthday cake","A cat"],ans:2},
  ],
  chapters:[
    {title:"Chapter 1",subtitle:"حياة هاري الحزينة",text:"Harry Potter is a small boy who lives with the Dursley family. His aunt Petunia and uncle Vernon are not kind to him. They give him old clothes that are too big and make him sleep in a small space under the stairs. Dudley is Harry's cousin. Dudley has many toys and sweets, but he is rude and always tries to hurt Harry. The Dursleys never say anything nice to Harry. They do not tell him the truth about his parents. They say that his parents died in a car crash. Harry feels sad and lonely. He never gets gifts or love. He does not feel like part of the family."},
    {title:"Chapter 2",subtitle:"الرسائل الغامضة",text:"One morning, many letters arrive at the Dursley house. They are for Harry. Uncle Vernon takes the letters and does not let Harry read them. More letters come every day. Uncle Vernon is very angry and scared. He takes the family to a small house near the sea. But on Harry's birthday, a very big man breaks down the door. His name is Hagrid. He has kind eyes and a warm smile. Hagrid gives Harry a birthday cake. It is Harry's first birthday cake. Hagrid tells Harry the truth. Harry is a wizard. His parents were a witch and a wizard. A very bad wizard named Voldemort killed them."},
    {title:"Chapter 3",subtitle:"عالم السحر",text:"Hagrid takes Harry to London. They go to a secret street called Diagon Alley. It is a magical place full of witches and wizards. Harry sees shops with magical things like wands and spell books. They go to Gringotts bank. It is run by goblins. Harry learns that his parents left him gold in the bank. He buys everything he needs for school. He buys robes, books, and a wand. His wand chooses him. Then Hagrid buys Harry a wonderful gift. It is a beautiful white owl. Harry names her Hedwig."},
  ]},
  {id:1,title:"Harry Potter and the Chamber of Secrets",author:"J.K. Rowling",level:"A2",cat:"fantasy",color:"linear-gradient(135deg,#1b5e20,#388e3c)",emoji:"🐍",
  quiz:[
    {q:"What is the name of the house elf who warns Harry?",opts:["Kreacher","Dobby","Winky","Griphook"],ans:1},
    {q:"Where is the Chamber of Secrets?",opts:["In the library","Under the lake","Beneath the girls bathroom","In the forest"],ans:2},
  ],
  chapters:[
    {title:"Chapter 1",subtitle:"تحذير دوبي",text:"Harry Potter is spending the summer with the Dursleys again. He misses his friends at Hogwarts very much. One evening Harry goes to his room and finds a small strange creature sitting on his bed. The creature has big green eyes and very large ears. It is a house elf. His name is Dobby. Dobby tells Harry that he must not go back to Hogwarts. He says that terrible things will happen there this year. Harry says he must go back because his friends are there. Dobby begs Harry to stay home. But Harry refuses. That night Harry's friends Ron and Fred and George arrive in a flying car to rescue him from the Dursleys."},
  ]},
  {id:2,title:"The Lion, the Witch and the Wardrobe",author:"C.S. Lewis",level:"A1",cat:"fantasy",color:"linear-gradient(135deg,#004d40,#00796b)",emoji:"🦁",
  quiz:[
    {q:"What does Lucy find at the back of the wardrobe?",opts:["A hidden room","Snow and a forest","A treasure chest","A secret door"],ans:1},
    {q:"What is the name of the faun Lucy meets?",opts:["Mr Beaver","Aslan","Mr Tumnus","Jadis"],ans:2},
  ],
  chapters:[
    {title:"Chapter 1",subtitle:"الخزانة السحرية",text:"Four children go to live in a big old house in the country. Their names are Peter, Susan, Edmund, and Lucy. One day the children explore the house. Lucy finds a big wooden wardrobe. She opens the door and goes inside. She pushes past the coats. At the back of the wardrobe she feels something strange. It is cold and wet. She looks down and sees snow. She walks forward and finds herself in a forest. The snow falls softly. Lucy sees a lamp post in the middle of the forest. A strange creature walks toward her. He has the legs of a goat but the body of a man. His name is Mr Tumnus. He is a faun and he is very surprised to see Lucy."},
  ]},
  {id:3,title:"A Study in Scarlet",author:"Arthur Conan Doyle",level:"B1",cat:"mystery",color:"linear-gradient(135deg,#4a148c,#7b1fa2)",emoji:"🔍",
  quiz:[
    {q:"How does Holmes know Watson has been in Afghanistan?",opts:["Watson told him","A friend told him","Holmes deduced it from clues","He read it in a letter"],ans:2},
    {q:"What is Holmes's job?",opts:["Police officer","Consulting detective","Private investigator","Professor"],ans:1},
  ],
  chapters:[
    {title:"Chapter 1",subtitle:"اللقاء الأول",text:"In the year 1878 I took my degree of Doctor of Medicine. I went to serve in Afghanistan where I was wounded in battle. After many months in hospital I was sent back to England. I had no money and no home. One day I met an old friend named Stamford. He said he knew a man also looking for someone to share rooms with. His name was Sherlock Holmes. At the laboratory I met Holmes for the first time. He was tall and thin with sharp eyes. When he saw me he said something extraordinary. He said I perceive you have been in Afghanistan. I was completely astonished. How could he possibly know that? Holmes just smiled. I knew then that my life was about to become very interesting."},
  ]},
  {id:4,title:"Charlotte's Web",author:"E.B. White",level:"A1",cat:"classic",color:"linear-gradient(135deg,#e65100,#f57c00)",emoji:"🕷️",
  quiz:[
    {q:"Who is Wilbur?",opts:["A horse","A pig","A spider","A dog"],ans:1},
    {q:"Who saves Wilbur's life?",opts:["Fern","Mr Zuckerman","Charlotte","Templeton"],ans:2},
  ],
  chapters:[
    {title:"Chapter 1",subtitle:"خنزير صغير",text:"Wilbur is a small pig who lives on a farm. He is born in the spring. Fern is a young girl who lives on the farm. When Wilbur is born he is very small and weak. Fern cries and begs her father to let Wilbur live. Fern takes care of Wilbur like a baby. She feeds him milk from a bottle. Wilbur grows bigger and stronger every day. When Wilbur is older he goes to live in the barn. In the barn Wilbur meets many animals but he is lonely. He wants a friend. One morning he hears a small voice that says it will be his friend. That night he sees who is speaking to him. It is a spider named Charlotte. She lives in the corner of his pen and she is wise and kind."},
  ]},
  {id:5,title:"The Little Prince",author:"Antoine de Saint-Exupery",level:"A2",cat:"classic",color:"linear-gradient(135deg,#006064,#0097a7)",emoji:"👑",
  quiz:[
    {q:"Where does the Little Prince come from?",opts:["Earth","A small asteroid","The moon","Mars"],ans:1},
    {q:"What does the pilot draw for the prince?",opts:["A flower","A sheep","A snake","A house"],ans:1},
  ],
  chapters:[

let savedVocab=JSON.parse(localStorage.getItem('eng_vocab')||'[]');
let quizScores=JSON.parse(localStorage.getItem('eng_quiz')||'[]');
let currentBook=null,currentChapter=0;
let isPlaying=false,playSpeed=1.0;
let sentences=[],currentSentence=0;
let progressTimer=null,elapsedTime=0,totalTime=0;
let currentLevel='all',currentCat='all';
let sessionWords=0;
let voices=[];

// Load voices
function loadVoices(){
  voices=speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

function getBritishVoice(){
  if(!voices.length)voices=speechSynthesis.getVoices();
  return voices.find(v=>v.lang==='en-GB'&&v.name.includes('Female'))
    ||voices.find(v=>v.lang==='en-GB')
    ||voices.find(v=>v.lang.startsWith('en-'))
    ||voices[0];
}

// ===== LIBRARY =====
function renderLibrary(){
  const f=b=>(currentLevel==='all'||b.level===currentLevel)&&(currentCat==='all'||b.cat===currentCat);
  const all=books.filter(f);
  const fantasy=all.filter(b=>b.cat==='fantasy');
  const mystery=all.filter(b=>b.cat==='mystery');
  const classic=all.filter(b=>b.cat==='classic'||b.cat==='adventure');
  const feat=all[0]||books[0];

  document.getElementById('featuredDiv').innerHTML=`
    <div class="section-title">⭐ مميز لك</div>
    <div class="featured-card" style="background:${feat.color}" onclick="openBook(${feat.id})">
      <div class="featured-overlay"></div>
      <div class="featured-emoji">${feat.emoji}</div>
      <div class="featured-info">
        <div class="featured-badge badge-${feat.level.toLowerCase()}">${feat.level} ${levelName(feat.level)}</div>
        <div class="featured-title">${feat.title}</div>
        <div class="featured-sub">${feat.author}</div>
      </div>
    </div>`;

  const renderGrid=(list,fallback)=>
    (list.length?list:fallback).map(b=>`
      <div class="book-card" onclick="openBook(${b.id})">
        <div class="book-cover" style="background:${b.color}">
          <div class="book-emoji">${b.emoji}</div>
          <div class="book-title-cover">${b.title}</div>
          <div class="book-level-badge badge-${b.level.toLowerCase()}">${b.level}</div>
        </div>
        <div class="book-name">${b.title}</div>
        <div class="book-author">${b.author}</div>
      </div>`).join('');

  document.getElementById('fantasyGrid').innerHTML=renderGrid(fantasy,all.slice(0,4));
  document.getElementById('mysteryGrid').innerHTML=renderGrid(mystery,all.slice(0,3));
  document.getElementById('classicGrid').innerHTML=renderGrid(classic,all.slice(0,4));
}

function levelName(l){return{A1:'مبتدئ',A2:'ابتدائي',B1:'متوسط',B2:'متقدم'}[l]||'';}

function filterLevel(l,btn){
  currentLevel=l;
  document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderLibrary();
}
function filterCat(c,btn){
  currentCat=c;
  document.querySelectorAll('.cat-chip').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderLibrary();
}

// ===== READER =====
function openBook(id){
  currentBook=books[id];currentChapter=0;
  stopAudio();sessionWords=0;
  renderChapter();
  document.getElementById('libPage').classList.remove('active');
  document.getElementById('readerPage').classList.add('active');
  document.getElementById('bottomNav').style.display='none';
}

function closeReader(){
  stopAudio();
  document.getElementById('readerPage').classList.remove('active');
  document.getElementById('libPage').classList.add('active');
  document.getElementById('bottomNav').style.display='flex';
}

function renderChapter(){
  const ch=currentBook.chapters[currentChapter]||currentBook.chapters[0];
  document.getElementById('readerTitle').textContent=currentBook.title;
  sentences=ch.text.match(/[^.!?]+[.!?]+/g)||[ch.text];
  totalTime=sentences.length*5;
  document.getElementById('timeTot').textContent=formatTime(totalTime);

  let html=`<div class="chapter-title"><span>${ch.title}:</span> ${ch.subtitle}</div>`;
  sentences.forEach((sent,si)=>{
    const wHTML=sent.trim().split(/\s+/).map(w=>{
      const clean=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
      const isNew=!!wordTranslations[clean]&&!savedVocab.find(v=>v.word===clean);
      return`<span class="word${isNew?' new-word':''}" data-word="${clean}" data-si="${si}" onclick="showTranslation(this,event)">${w}</span> `;
    }).join('');
    html+=`<span data-si="${si}">${wHTML}</span><span class="sent-btn" onclick="speakSentence(${si})">🔊</span> `;
  });
  document.getElementById('chapterContent').innerHTML=html;
  currentSentence=0;elapsedTime=0;updateProgress();
}

// ===== SPEECH =====
function speakText(text,onEnd){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-GB';
  u.rate=playSpeed;
  u.pitch=1;
  const v=getBritishVoice();
  if(v)u.voice=v;
  if(onEnd)u.onend=onEnd;
  speechSynthesis.speak(u);
  return u;
}

function speakWord(word){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-GB';u.rate=0.8;
  const v=getBritishVoice();
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}

function speakSentence(si){
  stopAudio();
  speakText(sentences[si]);
  highlightSentence(si);
}

function togglePlay(){
  if(isPlaying)pauseAudio();else playAudio();
}

function playAudio(){
  isPlaying=true;
  document.getElementById('playMain').textContent='⏸';
  speakFromSentence(currentSentence);
}

function pauseAudio(){
  isPlaying=false;
  speechSynthesis.cancel();
  clearInterval(progressTimer);
  document.getElementById('playMain').textContent='▶';
}

function stopAudio(){
  isPlaying=false;
  speechSynthesis.cancel();
  clearInterval(progressTimer);
  document.getElementById('playMain').textContent='▶';
}

function speakFromSentence(si){
  if(!isPlaying||si>=sentences.length){
    if(si>=sentences.length){stopAudio();currentSentence=0;updateProgress();}
    return;
  }
  currentSentence=si;
  highlightSentence(si);
  elapsedTime=si*(totalTime/Math.max(sentences.length,1));

  speakText(sentences[si],()=>{
    if(isPlaying){speakFromSentence(currentSentence+1);}
  });

  clearInterval(progressTimer);
  const startAt=Date.now()-elapsedTime*1000;
  progressTimer=setInterval(()=>{
    if(isPlaying){
      const e=Math.min((Date.now()-startAt)/1000,totalTime);
      const pct=e/totalTime*100;
      document.getElementById('progressFill').style.width=pct+'%';
      document.getElementById('progressDot').style.left=pct+'%';
      document.getElementById('timeNow').textContent=formatTime(e);
    }
  },200);
}

function cycleSpeed(){
  const sp=[0.5,0.75,1.0,1.25,1.5,2.0];
  playSpeed=sp[(sp.indexOf(playSpeed)+1)%sp.length];
  document.getElementById('speedBtn').textContent=playSpeed+'x';
  if(isPlaying){speechSynthesis.cancel();speakFromSentence(currentSentence);}
}

function skipBack(){
  currentSentence=Math.max(0,currentSentence-1);
  elapsedTime=currentSentence*(totalTime/Math.max(sentences.length,1));
  if(isPlaying){speechSynthesis.cancel();speakFromSentence(currentSentence);}
  else highlightSentence(currentSentence);
  updateProgress();
}

function skipFwd(){
  currentSentence=Math.min(sentences.length-1,currentSentence+1);
  elapsedTime=currentSentence*(totalTime/Math.max(sentences.length,1));
  if(isPlaying){speechSynthesis.cancel();speakFromSentence(currentSentence);}
  else highlightSentence(currentSentence);
  updateProgress();
}

function seekProgress(e){
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=Math.max(0,Math.min((e.clientX-rect.left)/rect.width,1));
  currentSentence=Math.floor(pct*sentences.length);
  elapsedTime=pct*totalTime;
  if(isPlaying){speechSynthesis.cancel();speakFromSentence(currentSentence);}
  updateProgress();
}

function highlightSentence(si){
  document.querySelectorAll('.word').forEach(w=>w.classList.remove('highlighted'));
  document.querySelectorAll(`[data-si="${si}"]`).forEach(w=>w.classList.add('highlighted'));
  const first=document.querySelector(`[data-si="${si}"]`);
  if(first)first.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateProgress(){
  const pct=totalTime>0?Math.min(elapsedTime/totalTime*100,100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressDot').style.left=pct+'%';
  document.getElementById('timeNow').textContent=formatTime(elapsedTime);
}

function formatTime(s){
  s=Math.max(0,s||0);
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return`${m<10?'0'+m:m}:${sec<10?'0'+sec:sec}`;
}

function setMode(m){
  document.getElementById('listenTab').classList.toggle('active',m==='listen');
  document.getElementById('readTab').classList.toggle('active',m==='read');
}

// ===== TRANSLATION =====
function showTranslation(el,e){
  e.stopPropagation();
  const word=el.dataset.word;
  if(!word)return;
  const arabic=wordTranslations[word];
  if(!arabic)return;
  document.getElementById('tWord').textContent=word;
  document.getElementById('tArabic').textContent=arabic;
  const popup=document.getElementById('transPopup');
  popup.classList.add('show');
  const rect=el.getBoundingClientRect();
  let top=rect.top-100,left=rect.left;
  if(top<60)top=rect.bottom+8;
  if(left+190>window.innerWidth)left=window.innerWidth-195;
  if(left<5)left=5;
  popup.style.top=top+'px';
  popup.style.left=left+'px';
  popup.style.right='auto';
  if(!savedVocab.find(v=>v.word===word)){
    savedVocab.push({word,arabic,book:currentBook?.title||''});
    localStorage.setItem('eng_vocab',JSON.stringify(savedVocab));
    sessionWords++;
    document.getElementById('newWordsBadge').textContent=`✅ ${sessionWords}`;
    renderVocab();updateStats();
  }
  speakWord(word);
}

document.addEventListener('click',e=>{
  if(!e.target.classList.contains('word')&&!e.target.closest('.trans-popup'))
    document.getElementById('transPopup').classList.remove('show');
});

// ===== QUIZ =====
let quizQ=0,quizScore=0,quizAnswered=false;

function showQuiz(){
  if(!currentBook?.quiz?.length){alert('لا يوجد اختبار لهذا الكتاب');return;}
  quizQ=0;quizScore=0;
  renderQuizQ();
  document.getElementById('quizOverlay').classList.add('show');
}

function renderQuizQ(){
  const quiz=currentBook.quiz;
  if(quizQ>=quiz.length){showQuizResult();return;}
  const q=quiz[quizQ];
  quizAnswered=false;
  document.getElementById('quizCard').innerHTML=`
    <div class="quiz-progress">سؤال ${quizQ+1} من ${quiz.length}</div>
    <div style="width:100%;height:4px;background:var(--border);border-radius:4px;margin-bottom:16px">
      <div style="width:${quizQ/quiz.length*100}%;height:100%;background:var(--blue);border-radius:4px;transition:width .3s"></div>
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">${q.opts.map((o,i)=>`<div class="quiz-opt" onclick="answerQuiz(${i},${q.ans},this)">${o}</div>`).join('')}</div>`;
}

function answerQuiz(chosen,correct,el){
  if(quizAnswered)return;
  quizAnswered=true;
  document.querySelectorAll('.quiz-opt').forEach(o=>o.style.pointerEvents='none');
  if(chosen===correct){el.classList.add('correct');quizScore++;speakWord('Correct');}
  else{el.classList.add('wrong');document.querySelectorAll('.quiz-opt')[correct].classList.add('correct');}
  setTimeout(()=>{quizQ++;renderQuizQ();},1300);
}

function showQuizResult(){
  const total=currentBook.quiz.length;
  const pct=Math.round(quizScore/total*100);
  const msg=pct>=80?'🎉 ممتاز!':pct>=60?'👍 جيد!':'💪 حاول مرة أخرى';
  quizScores.push({book:currentBook.title,score:quizScore,total,pct});
  localStorage.setItem('eng_quiz',JSON.stringify(quizScores));
  updateStats();
  document.getElementById('quizCard').innerHTML=`
    <div style="text-align:center;padding:10px">
      <div class="quiz-score">${quizScore}/${total}</div>
      <div style="font-size:1.8rem;margin:8px 0">${pct>=80?'🌟':pct>=60?'✅':'🔄'}</div>
      <div style="color:var(--muted);font-size:.9rem">${msg}</div>
      <div style="color:var(--muted);font-size:.8rem;margin-top:4px">${pct}% إجابات صحيحة</div>
      <button class="quiz-btn" onclick="document.getElementById('quizOverlay').classList.remove('show')">إغلاق</button>
    </div>`;
}

// ===== VOCAB =====
function renderVocab(){
  document.getElementById('vocabList').innerHTML=savedVocab.length?
    [...savedVocab].reverse().map(v=>`
      <div class="vocab-card">
        <div>
          <div class="vocab-en">${v.word}</div>
          <div class="vocab-ar">${v.arabic}</div>
          ${v.book?`<div style="font-size:.68rem;color:var(--blue);margin-top:2px">${v.book.split(' ').slice(0,3).join(' ')}</div>`:''}
        </div>
        <button class="speak-word-btn" onclick="speakWord('${v.word}')">🔊</button>
      </div>`).join(''):
    '<div style="text-align:center;padding:40px;color:var(--muted)">📝 اضغط على الكلمات الذهبية في القراءة لحفظها هنا</div>';
}

function updateStats(){
  const vc=savedVocab.length;
  document.getElementById('vocabCountProg').textContent=vc+' كلمة';
  document.getElementById('vocabProg').style.width=Math.min(vc,100)+'%';
  if(quizScores.length){
    document.getElementById('quizResults').innerHTML=quizScores.slice(-3).reverse().map(s=>
      `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:.8rem">${s.book.split(' ').slice(0,3).join(' ')}...</span>
        <span style="font-weight:700;color:${s.pct>=80?'var(--green)':s.pct>=60?'var(--gold)':'var(--red)'}">${s.pct}%</span>
      </div>`).join('');
  }
}

function showMainPage(id,nav){
  ['libPage','vocabPage','progressPage'].forEach(p=>document.getElementById(p).classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  nav.classList.add('active');
  if(id==='vocabPage')renderVocab();
  if(id==='progressPage')updateStats();
}

// ===== INIT =====
renderLibrary();
renderVocab();
updateStats();
</script>
</body>
</html>
